<div class="board">

  <div class="column">
    <h2>To Do</h2>

    <div
      cdkDropList
      #todoList="cdkDropList"
      [cdkDropListData]="todo"
      [cdkDropListConnectedTo]="[progressList, doneList]"
      class="task-list"
      (cdkDropListDropped)="drop($event)">

      @for (task of todo; track task) {
        <div class="task-card" cdkDrag>
          {{ task }}
        </div>
      }

    </div>
  </div>

  <div class="column">
    <h2>In Progress</h2>

    <div
      cdkDropList
      #progressList="cdkDropList"
      [cdkDropListData]="inProgress"
      [cdkDropListConnectedTo]="[todoList, doneList]"
      class="task-list"
      (cdkDropListDropped)="drop($event)">

      @for (task of inProgress; track task) {
        <div class="task-card" cdkDrag>
          {{ task }}
        </div>
      }

    </div>
  </div>

  <div class="column">
    <h2>Done</h2>

    <div
      cdkDropList
      #doneList="cdkDropList"
      [cdkDropListData]="done"
      [cdkDropListConnectedTo]="[todoList, progressList]"
      class="task-list"
      (cdkDropListDropped)="drop($event)">

      @for (task of done; track task) {
        <div class="task-card" cdkDrag>
          {{ task }}
        </div>
      }

    </div>
  </div>

</div>
